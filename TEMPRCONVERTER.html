<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Temperature Converter</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Card */
        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 300px;
            text-align: center;
        }

        /* Inputs */
        input, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        /* Button */
        button {
            width: 100%;
            padding: 12px;
            background: #1976d2;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        button:hover {
            background: #0d47a1;
        }

        /* Result */
        h3 {
            margin-top: 20px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Temperature Converter</h2>

    <input type="number" id="temp" placeholder="Enter temperature">

    <select id="type">
        <option value="celsius">Celsius to Fahrenheit</option>
        <option value="fahrenheit">Fahrenheit to Celsius</option>
    </select>

    <button onclick="convertTemp()">Convert</button>

    <h3 id="result"></h3>
</div>

<script>
function convertTemp() {
    let temp = document.getElementById("temp").value;
    let type = document.getElementById("type").value;
    let result = document.getElementById("result");

    if (temp === "") {
        result.innerHTML = "Please enter a value!";
        return;
    }

    temp = parseFloat(temp);

    if (type === "celsius") {
        let fahrenheit = (temp * 9/5) + 32;
        result.innerHTML = "Result: " + fahrenheit.toFixed(2) + " °F";
    } else {
        let celsius = (temp - 32) * 5/9;
        result.innerHTML = "Result: " + celsius.toFixed(2) + " °C";
    }
}
</script>

</body>
</html>
